<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#edf1e8">
  <title>404 — Page Not Found · Abhinav Varma Konderu</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    :root {
      --bg: #edf1e8;
      --ink: #141414;
      --accent1: #ed6a5a;
      --accent1-deep: #b23a28;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 540px; }
    .code {
      font-family: Georgia, "Times New Roman", serif;
      font-style: italic;
      font-weight: 700;
      font-size: clamp(5rem, 22vw, 11rem);
      line-height: 0.9;
      color: var(--accent1-deep);
      letter-spacing: -0.02em;
    }
    .label {
      font-family: "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.72rem;
      color: var(--accent1-deep);
      margin: 1.5rem 0 0.75rem;
    }
    h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 700;
      font-size: clamp(1.4rem, 4vw, 2rem);
      margin-bottom: 1rem;
    }
    p {
      font-size: 1rem;
      line-height: 1.6;
      opacity: 0.78;
      margin-bottom: 2rem;
    }
    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--ink);
      color: var(--bg);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      padding: 0.85rem 1.6rem;
      border: 2px solid var(--ink);
      box-shadow: 6px 6px 0 var(--accent1);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .home-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 8px 8px 0 var(--accent1-deep);
    }
    .home-btn:focus-visible {
      outline: 2px solid var(--accent1-deep);
      outline-offset: 3px;
    }
    .home-btn .arrow { transition: transform 0.15s ease; }
    .home-btn:hover .arrow { transform: translateX(4px); }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="code" aria-hidden="true">404</div>
    <p class="label">Page Not Found</p>
    <h1>This data point doesn't exist.</h1>
    <p>The page you're looking for has moved, been removed, or never existed. Let's get you back to the dashboard.</p>
    <a class="home-btn" href="/">Back to Home <span class="arrow" aria-hidden="true">&rarr;</span></a>
  </main>
</body>
</html>
